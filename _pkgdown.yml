url: https://yhoriuchi.github.io/jpmap/

template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#782F40"
    secondary: "#CEB888"
    link-color: "#782F40"
    navbar-dark-color: "#FFFFFF"
    navbar-dark-hover-color: "#CEB888"

development:
  mode: unreleased

home:
  title: jpmap
  description: Draw Japan maps with visible Okinawa and Ogasawara insets.

navbar:
  structure:
    left: [home, articles, reference, news, faq_page]
    right: [github]
  components:
    faq_page:
      text: "FAQ"
      href: articles/faq.html

articles:
- title: Getting Started
  desc: Install jpmap, get boundary data, import maps, and transform coordinates.
  contents:
  - getting-started
  - download-boundary-data
  - import-boundary-data
  - transform-data

- title: Tutorials
  desc: Simple plotting workflows using the bundled GDP and U.S. base datasets.
  contents:
  - prefectural-choropleths
  - prefectural-point-maps
  - municipal-choropleths
  - municipal-point-maps

- title: Map Options
  desc: Control island insets and answer common map questions.
  contents:
  - inset-options
  - faq

reference:
- title: Example Data
  desc: >
    Sample datasets used in jpmap examples. `jp_prefecture_gdp` is based on
    [OECD 2021 regional GDP per-capita values tabulated on Wikipedia](https://en.wikipedia.org/wiki/List_of_Japanese_prefectures_by_GDP_per_capita).
    `jp_us_military_bases` stores row-level public source links in its
    `source_url` column, including linked installation and command pages.
  contents:
  - jp_prefecture_gdp
  - jp_us_military_bases

- title: Map Data
  desc: Retrieve, build, and inspect Japan boundary data.
  contents:
  - jp_map
  - jp_map_with_data
  - jp_disputed_territories
  - jpmap_data

- title: Plotting
  desc: Draw maps with prefecture or municipal boundaries.
  contents:
  - plot_jpmap

- title: Coordinates
  desc: Transform points and geometries to the jpmap inset projection.
  contents:
  - jpmap_transform
  - jpmap_crs

- title: Package
  contents:
  - jpmap-package
